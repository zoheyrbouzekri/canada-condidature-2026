<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pour Ikram 💕</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Quicksand:wght@400;600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    background: #fff0f5;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Quicksand', sans-serif;
    overflow: hidden;
  }

  .heart-bg {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
  }
  .heart-bg span {
    position: absolute;
    opacity: 0.15;
    animation: floatUp linear infinite;
  }
  @keyframes floatUp {
    0% { transform: translateY(100vh); opacity: 0.15; }
    100% { transform: translateY(-120px); opacity: 0; }
  }

  .card {
    position: relative;
    z-index: 10;
    background: white;
    border-radius: 32px;
    padding: 60px 50px;
    max-width: 480px;
    width: 90%;
    text-align: center;
    box-shadow: 0 20px 80px rgba(255, 100, 150, 0.2);
    border: 2px solid #ffd6e8;
  }

  .emoji-top {
    font-size: 3rem;
    margin-bottom: 20px;
    animation: bounce 1.5s ease-in-out infinite;
  }
  @keyframes bounce {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-10px); }
  }

  h1 {
    font-family: 'Playfair Display', serif;
    font-size: 1.9rem;
    color: #cc2060;
    line-height: 1.4;
    margin-bottom: 12px;
  }

  .subtitle {
    color: #e8729a;
    font-size: 1rem;
    margin-bottom: 40px;
  }

  .buttons {
    display: flex;
    gap: 20px;
    justify-content: center;
    align-items: center;
  }

  .btn {
    padding: 14px 36px;
    border-radius: 50px;
    border: none;
    font-family: 'Quicksand', sans-serif;
    font-size: 1.1rem;
    font-weight: 600;
    cursor: pointer;
  }

  .btn-oui {
    background: linear-gradient(135deg, #ff4d88, #ff85a1);
    color: white;
    box-shadow: 0 8px 24px rgba(255, 77, 136, 0.4);
    transition: transform 0.15s, box-shadow 0.15s;
  }
  .btn-oui:hover, .btn-oui:active {
    transform: scale(1.05);
  }

  /* Non: normal dans la carte, puis fixed quand il s'échappe */
  #nonBtn {
    background: white;
    color: #cc2060;
    border: 2px solid #ffb3cc;
    user-select: none;
    -webkit-user-select: none;
  }
  #nonBtn.floating {
    position: fixed;
    z-index: 999;
    transition: left 0.08s ease-out, top 0.08s ease-out;
  }

  .success {
    display: none;
    animation: popIn 0.5s cubic-bezier(0.34,1.56,0.64,1) forwards;
  }
  @keyframes popIn {
    from { transform: scale(0.5); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
  }
  .success-emoji {
    font-size: 4rem;
    margin-bottom: 16px;
    animation: heartbeat 0.8s ease-in-out infinite;
  }
  @keyframes heartbeat {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.2); }
  }
  .success h2 {
    font-family: 'Playfair Display', serif;
    font-size: 2rem;
    color: #cc2060;
    line-height: 1.4;
  }

  .confetti-piece {
    position: fixed;
    border-radius: 2px;
    animation: fall linear forwards;
    pointer-events: none;
    z-index: 200;
  }
  @keyframes fall {
    0% { transform: translateY(-20px) rotate(0deg); opacity: 1; }
    100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
  }
</style>
</head>
<body>

<div class="heart-bg" id="heartBg"></div>

<div class="card">
  <div id="questionSection">
    <div class="emoji-top">🌸</div>
    <h1>T'es la personne préférée de Zoheyr</h1>
    <p class="subtitle">Est-ce vrai ? 👀</p>
    <div class="buttons">
      <button class="btn btn-oui" onclick="showSuccess()">Oui 💕</button>
      <button class="btn" id="nonBtn">Non 🙅‍♀️</button>
    </div>
  </div>

  <div class="success" id="successSection">
    <div class="success-emoji">❤️</div>
    <h2>MA PSY QUE J'AIME</h2>
    <p style="margin-top:16px; color:#e8729a; font-size:1.1rem;">avec tout mon cœur 💗</p>
  </div>
</div>

<script>
  // Floating hearts
  const heartBg = document.getElementById('heartBg');
  ['💕','🌸','💗','✨','🌷','💖'].forEach(() => {
    for (let i = 0; i < 3; i++) {
      const s = document.createElement('span');
      s.textContent = ['💕','🌸','💗','✨','🌷','💖'][Math.floor(Math.random()*6)];
      s.style.left = Math.random() * 100 + 'vw';
      s.style.fontSize = (0.8 + Math.random() * 1.4) + 'rem';
      s.style.animationDuration = (5 + Math.random() * 8) + 's';
      s.style.animationDelay = (Math.random() * 8) + 's';
      heartBg.appendChild(s);
    }
  });

  const btn = document.getElementById('nonBtn');
  let isFloating = false;

  function makeFloat() {
    if (!isFloating) {
      isFloating = true;
      const r = btn.getBoundingClientRect();
      btn.classList.add('floating');
      btn.style.left = r.left + 'px';
      btn.style.top = r.top + 'px';
      btn.style.width = r.width + 'px';
      btn.style.height = r.height + 'px';
    }
    moveBtnRandom();
  }

  function moveBtnRandom() {
    const pad = 24;
    const w = btn.offsetWidth;
    const h = btn.offsetHeight;
    const x = pad + Math.random() * (window.innerWidth - w - pad * 2);
    const y = pad + Math.random() * (window.innerHeight - h - pad * 2);
    btn.style.left = x + 'px';
    btn.style.top = y + 'px';
  }

  // Desktop
  btn.addEventListener('mouseover', makeFloat);

  // Mobile — intercept touch before any click fires
  btn.addEventListener('touchstart', (e) => {
    e.preventDefault();
    makeFloat();
  }, { passive: false });

  function showSuccess() {
    btn.style.display = 'none';
    document.getElementById('questionSection').style.display = 'none';
    document.getElementById('successSection').style.display = 'block';

    // Confetti
    const colors = ['#ff4d88','#ff85a1','#ffb3cc','#ffd6e8','#cc2060','#ffe4f0'];
    for (let i = 0; i < 70; i++) {
      const p = document.createElement('div');
      p.className = 'confetti-piece';
      p.style.left = Math.random() * 100 + 'vw';
      p.style.background = colors[Math.floor(Math.random() * colors.length)];
      const size = (6 + Math.random() * 10) + 'px';
      p.style.width = size; p.style.height = size;
      p.style.animationDuration = (1.5 + Math.random() * 2) + 's';
      p.style.animationDelay = (Math.random() * 0.6) + 's';
      document.body.appendChild(p);
      setTimeout(() => p.remove(), 4000);
    }
  }
</script>
</body>
</html>
